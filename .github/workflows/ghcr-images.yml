name: Publish GHCR Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: deploy/backend.Dockerfile
            image: ghcr.io/zsdd2/jdyk-backend
          - name: admin
            dockerfile: deploy/admin.Dockerfile
            image: ghcr.io/zsdd2/jdyk-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        if: matrix.name == 'admin'
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        if: matrix.name == 'admin'
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: pnpm

      - name: Install admin dependencies
        if: matrix.name == 'admin'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build workspace stubs
        if: matrix.name == 'admin'
        run: pnpm -r run --if-present stub

      - name: Build admin assets
        if: matrix.name == 'admin'
        working-directory: apps/web-antd
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          set +e
          ../../node_modules/.bin/vite build --mode production 2>&1 | tee /tmp/admin-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            message=$(node -e "const fs=require('fs');const s=fs.readFileSync('/tmp/admin-build.log','utf8').slice(-6000);process.stdout.write(s.replace(/%/g,'%25').replace(/\r/g,'%0D').replace(/\n/g,'%0A'))")
            echo "::error title=Admin build failed::$message"
            exit "$status"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=2.0.6
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Make GHCR package public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ matrix.image }}
        run: |
          package_name="${IMAGE#ghcr.io/${{ github.repository_owner }}/}"
          gh api \
            --method PATCH \
            "/user/packages/container/${package_name}/visibility" \
            -f visibility=public
