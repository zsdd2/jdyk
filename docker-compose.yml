services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wangri_zhongxian
      POSTGRES_PASSWORD: wangri_zhongxian
      POSTGRES_USER: wangri_zhongxian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  backend-api:
    image: node:24-bookworm
    working_dir: /workspace
    command: sh -c "corepack enable && corepack pnpm install && corepack pnpm dev:api"
    environment:
      PORT: 3999
    ports:
      - "3999:3999"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/node_modules
      - media_cache:/workspace/media-cache
    depends_on:
      - database
      - redis

  admin-web:
    image: node:24-bookworm
    working_dir: /workspace
    command: sh -c "corepack enable && corepack pnpm install && corepack pnpm dev:admin"
    ports:
      - "5200:5200"
    volumes:
      - .:/workspace
      - admin_node_modules:/workspace/node_modules
    depends_on:
      - backend-api

  tv-player-web:
    image: node:24-bookworm
    working_dir: /workspace
    command: sh -c "corepack enable && corepack pnpm install && corepack pnpm dev:tv"
    environment:
      VITE_API_BASE: /api
    ports:
      - "5174:5174"
    volumes:
      - .:/workspace
      - tv_node_modules:/workspace/node_modules
    depends_on:
      - backend-api

volumes:
  admin_node_modules:
  backend_node_modules:
  media_cache:
  postgres_data:
  tv_node_modules:
